[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["bcryptjs", "cheerio"]

[dev]
  framework = "vite"
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."scrape-matches"]
  schedule = "@hourly"
  timeout = 60

[functions."matches"]
  timeout = 60

[functions."scrape-trigger"]
  timeout = 60

[functions."auth-login"]
  timeout = 15

[functions."evaluate-bets"]
  schedule = "0 */2 * * *"
